services:
  # ── Backend: FastAPI ──────────────────────────────────────────────────────
  - type: web
    name: graphshield-api
    runtime: python
    rootDir: .
    buildCommand: "pip install -r requirements.txt && pip install -e ."
    startCommand: "uvicorn api_server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Set this manually in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MAX_AGENT_CALLS_PER_SCAN
        value: "10"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── Frontend: React/Vite Static Site ────────────────────────────────────
  - type: web
    name: graphshield-dashboard
    runtime: static
    rootDir: dashboard
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # After deploying the backend, set this to your backend Render URL
        # e.g. https://graphshield-api.onrender.com
        value: https://graphshield-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
